<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail AI Intelligence - 門市智慧決策系統</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f4f7f6; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { text-align: center; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 800px; }
        h1 { color: #1a2a6c; margin-bottom: 30px; font-size: 2.5em; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
        .card { padding: 30px; border: 2px solid #e0e0e0; border-radius: 15px; text-decoration: none; color: inherit; transition: all 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: #1a2a6c; box-shadow: 0 5px 15px rgba(26,42,108,0.2); }
        .card h2 { color: #1a2a6c; margin-top: 0; }
        .card p { color: #666; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Retail AI Intelligence</h1>
        <p>歡迎使用門市人力與營運優化決策系統</p>
        <div class="grid">
            <a href="/audit" class="card">
                <h2>📈 人力效率審計</h2>
                <p>分析門市現況，診斷薪資浪費與低效工時，模擬業績成長潛力。</p>
            </a>
            <a href="/forecast" class="card">
                <h2>🔮 智慧排班預測</h2>
                <p>結合歷史業績與 AI 模型，自動產出最優化的人力需求排班預測。</p>
            </a>
        </div>
    </div>
</body>
</html>
